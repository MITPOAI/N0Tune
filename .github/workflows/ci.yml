name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  python:
    name: Python API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install -e "packages/core[dev]"
          python -m pip install -e "apps/api[dev]"
          python -m pip install -e "packages/sdk-py[dev]"
          python -m pip install -e "integrations/langchain[dev]"
          python -m pip install -e "integrations/llamaindex[dev]"

      - name: Lint
        run: |
          ruff check apps/api
          ruff check packages/core
          ruff check packages/sdk-py
          ruff check integrations/langchain
          ruff check integrations/llamaindex

      - name: Typecheck
        run: |
          mypy apps/api/app
          mypy packages/core/src
          mypy packages/sdk-py/src
          mypy integrations/langchain/src
          mypy integrations/llamaindex/src

      - name: Test
        run: |
          pytest apps/api/app/tests
          pytest packages/core/tests
          pytest packages/sdk-py/tests
          pytest integrations/langchain/tests
          pytest integrations/llamaindex/tests

      - name: Python dependency audit
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit --progress-spinner off

  node:
    name: Node workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Node dependency audit
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose file
        run: docker compose config

  # Secret scanning runs in .github/workflows/security.yml using the Gitleaks
  # CLI. The gitleaks-action variant requires a paid GITLEAKS_LICENSE secret on
  # organization-owned repos and breaks CI for forks; the CLI does not.

  e2e:
    name: Dashboard e2e (Playwright)
    runs-on: ubuntu-latest
    needs: [python, node]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx --workspace apps/dashboard playwright install --with-deps chromium

      - name: Copy env template
        run: cp .env.example .env

      - name: Boot stack
        run: docker compose up -d --wait

      - name: Wait for API
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API never became ready"
          docker compose logs
          exit 1

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_BASE_URL: http://localhost:8000
        run: npm --workspace apps/dashboard run test:e2e

      - name: Tear down stack on failure
        if: failure()
        run: |
          docker compose logs --tail=200
          docker compose down -v

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
