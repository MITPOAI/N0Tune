name: Bug report
description: Something in N0Tune is not behaving the way the docs say it should.
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete and reproducible the report, the faster we can fix it.

        Before submitting, please check [open issues](https://github.com/n0tune/n0tune/issues) for duplicates. If this is a security report, **do not** file it here — see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What did you expect, what did you see?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce. Paste commands, curl invocations, code snippets, or a link to a small repo.
      placeholder: |
        1. docker compose up
        2. curl -X POST http://localhost:8000/v1/memories -d '...'
        3. Observe error in the response body.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, status codes, and stack traces. Redact API keys and personal data.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - API (apps/api)
        - Dashboard (apps/dashboard)
        - TypeScript SDK (packages/sdk-js)
        - Python SDK (packages/sdk-py)
        - MCP server (integrations/mcp-server)
        - LangChain integration
        - LlamaIndex integration
        - Vercel AI SDK integration
        - Docker Compose / deployment
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: N0Tune version or commit SHA
      placeholder: "0.1.0 / 6e87674"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node, Docker versions as relevant.
      placeholder: "macOS 14 / Python 3.12 / Node 20 / Docker 27"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Last few hundred lines from `docker compose logs api` or `pytest -x` output. Redact secrets.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched for an existing issue before filing this one.
          required: true
        - label: I redacted any API keys, personal data, or other secrets from the report.
          required: true
