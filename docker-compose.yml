services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: n0tune-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n0tune}
      POSTGRES_USER: ${POSTGRES_USER:-n0tune}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n0tune_dev_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: n0tune-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: n0tune-api
    environment:
      N0TUNE_ENVIRONMENT: ${N0TUNE_ENVIRONMENT:-development}
      N0TUNE_DATABASE_URL: ${N0TUNE_DATABASE_URL:-postgresql+psycopg://n0tune:n0tune_dev_password_change_me@postgres:5432/n0tune}
      N0TUNE_REDIS_URL: ${N0TUNE_REDIS_URL:-redis://redis:6379/0}
      N0TUNE_CORS_ORIGINS: ${N0TUNE_CORS_ORIGINS:-["http://localhost:3000"]}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: n0tune-dashboard
    environment:
      NEXT_PUBLIC_N0TUNE_API_BASE_URL: ${NEXT_PUBLIC_N0TUNE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
