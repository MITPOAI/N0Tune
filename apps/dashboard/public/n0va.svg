<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="N0va, the N0Tune mascot">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DE1D2" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#4DE1D2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4DE1D2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="hoodShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101a30" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hoodInterior" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#02050b"/>
      <stop offset="70%" stop-color="#03060d"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="eyeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B5F5EC"/>
      <stop offset="55%" stop-color="#4DE1D2"/>
      <stop offset="100%" stop-color="#1aa498"/>
    </radialGradient>
    <filter id="eyeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softAura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background aura -->
  <circle cx="120" cy="120" r="108" fill="url(#aura)"/>
  <circle cx="120" cy="118" r="78" fill="#4DE1D2" fill-opacity="0.05" filter="url(#softAura)"/>

  <!-- Shoulders / cloak body -->
  <path d="M40 232 C 50 178, 80 158, 120 158 C 160 158, 190 178, 200 232 Z"
        fill="url(#cloak)" stroke="#1d2b40" stroke-width="1.2"/>

  <!-- Inner cloak fold lines -->
  <path d="M120 158 L120 232" stroke="#1d2b40" stroke-width="0.8" stroke-opacity="0.55"/>
  <path d="M92 168 C 96 192, 102 214, 108 232" stroke="#1d2b40" stroke-width="0.6" stroke-opacity="0.4" fill="none"/>
  <path d="M148 168 C 144 192, 138 214, 132 232" stroke="#1d2b40" stroke-width="0.6" stroke-opacity="0.4" fill="none"/>

  <!-- Hood outer silhouette -->
  <path d="M64 162
           C 60 120, 78 70, 120 60
           C 162 70, 180 120, 176 162
           C 168 156, 156 152, 146 152
           C 138 148, 132 146, 120 146
           C 108 146, 102 148, 94 152
           C 84 152, 72 156, 64 162 Z"
        fill="url(#cloak)" stroke="#1d2b40" stroke-width="1.2"/>

  <!-- Hood inner shadow (the face cavity) -->
  <path d="M86 150
           C 84 122, 96 92, 120 86
           C 144 92, 156 122, 154 150
           C 146 148, 138 146, 120 146
           C 102 146, 94 148, 86 150 Z"
        fill="url(#hoodInterior)"/>

  <!-- Subtle hood top highlight to give depth -->
  <path d="M76 130
           C 78 96, 96 70, 120 64
           C 144 70, 162 96, 164 130"
        fill="none" stroke="url(#hoodShade)" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- Eye glow halos (soft, behind) -->
  <g filter="url(#softAura)" opacity="0.85">
    <ellipse cx="104" cy="122" rx="11" ry="7" fill="#4DE1D2" fill-opacity="0.55"/>
    <ellipse cx="136" cy="122" rx="11" ry="7" fill="#4DE1D2" fill-opacity="0.55"/>
  </g>

  <!-- Eyes -->
  <g filter="url(#eyeGlow)">
    <ellipse cx="104" cy="122" rx="5.2" ry="3.4" fill="url(#eyeCore)"/>
    <ellipse cx="136" cy="122" rx="5.2" ry="3.4" fill="url(#eyeCore)"/>
    <ellipse cx="103" cy="121" rx="1.6" ry="1.1" fill="#EAFBF7"/>
    <ellipse cx="135" cy="121" rx="1.6" ry="1.1" fill="#EAFBF7"/>
  </g>

  <!-- Faint rim light along hood edge -->
  <path d="M66 158
           C 62 118, 80 72, 120 62"
        fill="none" stroke="#4DE1D2" stroke-opacity="0.12" stroke-width="1.2"/>
  <path d="M174 158
           C 178 118, 160 72, 120 62"
        fill="none" stroke="#4DE1D2" stroke-opacity="0.12" stroke-width="1.2"/>
</svg>
